<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマホ風カーレース</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
  font-family: sans-serif;
}
canvas {
  display: block;
  margin: auto;
  background: linear-gradient(#444, #222);
}
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 18px;
}
#startBtn {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  font-size: 18px;
  background: #ff4757;
  border: none;
  border-radius: 10px;
  color: white;
}
</style>
</head>
<body>
<div id="ui">スコア: <span id="score">0</span></div>
<button id="startBtn">スタート</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 400;
canvas.height = 600;

let gameRunning = false;
let score = 0;
let speed = 4;

const player = {
  x: 180,
  y: 500,
  width: 40,
  height: 60
};

const enemies = [];

function drawCar(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 40, 60);
}

function spawnEnemy() {
  const x = Math.random() * (canvas.width - 40);
  enemies.push({ x: x, y: -60 });
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // road lines
  ctx.fillStyle = "white";
  for (let i = 0; i < canvas.height; i += 40) {
    ctx.fillRect(195, i + (Date.now()/10 % 40), 10, 20);
  }

  // player
  drawCar(player.x, player.y, "#1e90ff");

  // enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    e.y += speed;
    drawCar(e.x, e.y, "#ff3b3b");

    // collision
    if (
      player.x < e.x + 40 &&
      player.x + 40 > e.x &&
      player.y < e.y + 60 &&
      player.y + 60 > e.y
    ) {
      gameRunning = false;
      alert("ゲームオーバー！スコア: " + score);
      location.reload();
    }

    // remove off screen
    if (e.y > canvas.height) {
      enemies.splice(i, 1);
      score++;
      document.getElementById("score").textContent = score;
    }
  }

  if (gameRunning) requestAnimationFrame(update);
}

// controls (PC + スマホ対応)
document.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  player.x = e.clientX - rect.left - 20;
});

document.addEventListener("touchmove", (e) => {
  const rect = canvas.getBoundingClientRect();
  player.x = e.touches[0].clientX - rect.left - 20;
});

// start button
document.getElementById("startBtn").onclick = () => {
  gameRunning = true;
  document.getElementById("startBtn").style.display = "none";
  setInterval(spawnEnemy, 1000);
  update();
};
</script>
</body>
</html>
