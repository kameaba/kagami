<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D風カーレース</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:sans-serif; }
canvas { display:block; margin:auto; background:#222; }
#ui { position:absolute; top:10px; left:10px; color:white; font-size:18px; display:none; }
#titleScreen {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  background:linear-gradient(#000,#222);
  color:white;
}
#titleScreen h1 { font-size:32px; margin-bottom:20px; }
#startBtn { padding:12px 24px; font-size:18px; background:#ff4757; border:none; border-radius:10px; color:white; }
</style>
</head>
<body>

<div id="titleScreen">
  <h1>🏎 3Dレーシング</h1>
  <button id="startBtn">スタート</button>
</div>

<div id="ui">スコア: <span id="score">0</span> | スピード: <span id="spd">1</span></div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 400;
canvas.height = 600;

let gameRunning = false;
let score = 0;
let baseSpeed = 2;
let speed = baseSpeed;

const player = { x: 200, y: 520 };
const enemies = [];

// 車画像
const playerImg = new Image();
playerImg.src = "https://i.imgur.com/7QZ6F6T.png";

const enemyImg = new Image();
enemyImg.src = "https://i.imgur.com/8Qf6F6T.png";

function drawCar(img, x, y, scale=1) {
  const w = 50 * scale;
  const h = 80 * scale;
  ctx.drawImage(img, x - w/2, y - h/2, w, h);
}

function spawnEnemy() {
  const x = Math.random() * (canvas.width - 80) + 40;
  enemies.push({ x: x, y: 0 });
}

function drawRoad() {
  ctx.fillStyle = "#333";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for (let i=0;i<20;i++) {
    let y = (i*40 + Date.now()/20 % 40);
    let scale = y / canvas.height;
    let w = 10 * scale;
    ctx.fillStyle = "white";
    ctx.fillRect(canvas.width/2 - w/2, y, w, 20*scale);
  }
}

function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawRoad();

  drawCar(playerImg, player.x, player.y, 1);

  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    e.y += speed;

    let scale = e.y / canvas.height;
    drawCar(enemyImg, e.x, e.y, scale + 0.5);

    if (
      Math.abs(player.x - e.x) < 30 &&
      Math.abs(player.y - e.y) < 40
    ) {
      gameRunning = false;
      alert("ゲームオーバー！スコア: " + score);
      location.reload();
    }

    if (e.y > canvas.height) {
      enemies.splice(i,1);
      score++;
      document.getElementById("score").textContent = score;

      speed = baseSpeed + score * 0.1;
      document.getElementById("spd").textContent = speed.toFixed(1);
    }
  }

  if (gameRunning) requestAnimationFrame(update);
}

function movePlayer(clientX) {
  const rect = canvas.getBoundingClientRect();
  player.x = clientX - rect.left;
}

document.addEventListener("mousemove", e => movePlayer(e.clientX));
document.addEventListener("touchmove", e => movePlayer(e.touches[0].clientX));

// スタート処理
startBtn.onclick = () => {
  document.getElementById("titleScreen").style.display = "none";
  document.getElementById("ui").style.display = "block";
  gameRunning = true;
  setInterval(spawnEnemy, 900);
  update();
};
</script>
</body>
</html>
