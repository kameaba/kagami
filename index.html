<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>あおばの3マッチゲーム</title>
<style>
  body{
    margin:0; font-family:sans-serif;
    background: linear-gradient(135deg,#ffd6ec,#d6f0ff);
    display:flex; justify-content:center; align-items:center; height:100vh;
  }
  .game{ background:white; padding:20px; border-radius:20px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
  h1{color:#ff6fa5; margin:5px 0;}
  .score{margin-bottom:10px; color:#666;}
  .grid{
    display:grid; grid-template-columns:repeat(8,40px); gap:5px; justify-content:center;
  }
  .cell{
    width:40px; height:40px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; transition:0.2s;
  }
  .cell:active{transform:scale(0.9);} 
</style>
</head>
<body>
<div class="game">
  <h1>🍬 3マッチパズル</h1>
  <div class="score">Score: <span id="score">0</span></div>
  <div class="grid" id="grid"></div>
</div>

<script>
const width = 8;
const icons = ['🍓','🍋','🍇','🍊','🫐','🍒'];
let board = [];
let score = 0;
let first = null;

const grid = document.getElementById("grid");
const scoreEl = document.getElementById("score");

function randomIcon(){ return icons[Math.floor(Math.random()*icons.length)]; }

function init(){
  board = Array.from({length: width*width}, randomIcon);
  draw();
}

function draw(){
  grid.innerHTML = '';
  board.forEach((v,i)=>{
    const d = document.createElement('div');
    d.className='cell';
    d.textContent=v;
    d.onclick=()=>select(i);
    grid.appendChild(d);
  });
}

function select(i){
  if(first===null){ first=i; return; }
  swap(first,i);
  if(checkMatches().length===0){ swap(first,i); }
  else{
    resolve();
  }
  first=null;
}

function swap(a,b){ [board[a],board[b]]=[board[b],board[a]]; draw(); }

function checkMatches(){
  let matches=[];
  // 横
  for(let r=0;r<width;r++){
    for(let c=0;c<width-2;c++){
      let i=r*width+c;
      let v=board[i];
      if(v && v===board[i+1] && v===board[i+2]){
        matches.push(i,i+1,i+2);
      }
    }
  }
  // 縦
  for(let c=0;c<width;c++){
    for(let r=0;r<width-2;r++){
      let i=r*width+c;
      let v=board[i];
      if(v && v===board[i+width] && v===board[i+2*width]){
        matches.push(i,i+width,i+2*width);
      }
    }
  }
  return [...new Set(matches)];
}

function resolve(){
  let matches = checkMatches();
  if(matches.length===0) return;
  matches.forEach(i=>{ board[i]=''; });
  score += matches.length * 10;
  scoreEl.textContent = score;
  drop();
  setTimeout(()=>{ resolve(); draw(); },200);
}

function drop(){
  for(let c=0;c<width;c++){
    let col=[];
    for(let r=0;r<width;r++){
      let v=board[r*width+c];
      if(v) col.push(v);
    }
    while(col.length<width){ col.unshift(randomIcon()); }
    for(let r=0;r<width;r++){
      board[r*width+c]=col[r];
    }
  }
  draw();
}

init();
</script>
</body>
</html>
