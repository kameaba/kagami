<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あおばのパズルゲーム</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#ffd6ec,#d6f0ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

h1{color:#ff6fa5;}

.grid{
  display:grid;
  grid-template-columns: repeat(4,70px);
  gap:10px;
  justify-content:center;
  margin-top:15px;
}

.tile{
  width:70px;
  height:70px;
  background:#ffe0f0;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  cursor:pointer;
  transition:0.2s;
}

.tile:hover{
  transform:scale(1.1);
}

.empty{
  background:transparent;
}

button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:#ff6fa5;
  color:white;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="game">
<h1>🧩 かわいいパズル</h1>
<p>タイルを動かして並べよう！</p>
<div class="grid" id="grid"></div>
<button onclick="shuffle()">シャッフル</button>
</div>

<script>
let tiles = [...Array(15).keys()].map(n=>n+1);
tiles.push("");

const grid = document.getElementById("grid");

function draw(){
  grid.innerHTML="";
  tiles.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="tile";
    if(t==="") div.classList.add("empty");
    div.textContent=t;
    div.onclick=()=>move(i);
    grid.appendChild(div);
  });
}

function move(i){
  const emptyIndex = tiles.indexOf("");
  const canMove = [i-1,i+1,i-4,i+4];
  if(canMove.includes(emptyIndex)){
    [tiles[i],tiles[emptyIndex]]=[tiles[emptyIndex],tiles[i]];
    draw();
    checkWin();
  }
}

function shuffle(){
  for(let i=tiles.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [tiles[i],tiles[j]]=[tiles[j],tiles[i]];
  }
  draw();
}

function checkWin(){
  const win = [...Array(15).keys()].map(n=>n+1).concat("");
  if(JSON.stringify(tiles)===JSON.stringify(win)){
    setTimeout(()=>alert("クリア！🎉"),100);
  }
}

shuffle();
</script>

</body>
</html>
