<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謎解き脱出ゲーム</title>
<style>
body{
  margin:0; font-family:sans-serif;
  background:#222; color:white;
  display:flex; justify-content:center; align-items:center; height:100vh;
}
.game{
  background:#333; padding:20px; border-radius:15px; width:300px; text-align:center;
}
button{
  margin-top:10px; padding:8px 12px; border:none; border-radius:8px;
  background:#ff6fa5; color:white; cursor:pointer;
}
input{padding:5px; border-radius:5px; border:none;}
</style>
</head>
<body>

<div class="game" id="game">
  <h2>🔒 脱出ゲーム</h2>
  <p id="text">あなたは部屋に閉じ込められた…</p>
  <input id="answer" placeholder="答えを入力">
  <button onclick="check()">決定</button>
</div>

<script>
let stage=0;

const texts=[
"あなたは部屋に閉じ込められた…『1+1は？』",
"ドアにメモがある…『赤＋青＝？（色で答えよ）』",
"最後の鍵…『英語で“ねこ”は？』",
"🔓 脱出成功！おめでとう！"
];

const answers=["2","むらさき","cat"];

function check(){
  const input=document.getElementById("answer").value.toLowerCase();

  if(input===answers[stage]){
    stage++;
    document.getElementById("text").textContent=texts[stage];
    document.getElementById("answer").value="";

    if(stage===texts.length-1){
      document.getElementById("answer").style.display="none";
    }
  }else{
    alert("違うみたい…！");
  }
}
</script>

</body>
</html>
