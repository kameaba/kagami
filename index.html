<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>あおばのツム風ゲーム</title>
<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#ffd6ec,#d6f0ff);display:flex;justify-content:center;align-items:center;height:100vh;}
.game{background:white;padding:15px;border-radius:25px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.2);position:relative;overflow:hidden;}
h1{color:#ff6fa5;margin:5px 0;}
.ui{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;}
canvas{background:#f8f8ff;border-radius:15px;touch-action:none;}
.bar{height:8px;background:#eee;border-radius:5px;overflow:hidden;margin:5px 0;}
.bar-inner{height:100%;background:#ff6fa5;width:100%;}
.fever{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:#ff4080;display:none;animation:pop 0.5s;}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(0);}100%{transform:translate(-50%,-50%) scale(1);}}
</style>
</head>
<body>
<div class="game">
  <h1>🧸 ツム風ゲーム</h1>
  <div class="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">60</span></div>
  </div>
  <div class="bar"><div class="bar-inner" id="bar"></div></div>
  <canvas id="canvas" width="320" height="400"></canvas>
  <div class="fever" id="feverText">FEVER TIME!!</div>
</div>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const icons=['🐰','🐱','🐻','🐼','🐶','🐸'];
let balls=[];let selected=[];let score=0;let time=60;
let dragging=false;let chainCount=0;let fever=false;let feverTimer=0;

const scoreEl=document.getElementById('score');
const timeEl=document.getElementById('time');
const bar=document.getElementById('bar');
const feverText=document.getElementById('feverText');

function createBalls(){
  balls=[];
  for(let i=0;i<30;i++){
    balls.push({x:Math.random()*280+20,y:Math.random()*360+20,r:18,type:icons[Math.floor(Math.random()*icons.length)]});
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  balls.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=fever?"#fff0f5":"#ffe0f0";
    ctx.fill();
    ctx.fillText(b.type,b.x-10,b.y+5);
  });
  if(selected.length>1){
    ctx.beginPath(); ctx.strokeStyle="#ff6fa5"; ctx.lineWidth=3;
    ctx.moveTo(selected[0].x,selected[0].y);
    for(let i=1;i<selected.length;i++){ctx.lineTo(selected[i].x,selected[i].y);} ctx.stroke();
  }
}

function distance(a,b){return Math.hypot(a.x-b.x,a.y-b.y);} 

canvas.addEventListener('mousedown',()=>dragging=true);
canvas.addEventListener('mouseup',endDrag);
canvas.addEventListener('mousemove',move);
canvas.addEventListener('touchstart',()=>dragging=true);
canvas.addEventListener('touchend',endDrag);
canvas.addEventListener('touchmove',move);

function getPos(e){const rect=canvas.getBoundingClientRect();let x,y;
  if(e.touches){x=e.touches[0].clientX;y=e.touches[0].clientY;}else{x=e.clientX;y=e.clientY;}
  return {x:x-rect.left,y:y-rect.top};}

function move(e){
  if(!dragging) return;
  const pos=getPos(e);
  balls.forEach(b=>{
    if(distance(pos,b)<b.r){
      if(selected.length===0){selected.push(b);} 
      else{
        let last=selected[selected.length-1];
        if(b!==last && b.type===last.type && !selected.includes(b) && distance(b,last)<50){
          selected.push(b);
        }
      }
    }
  });
  draw();
}

function endDrag(){
  dragging=false;
  if(selected.length>=3){
    chainCount++;
    let bonus = fever ? 20 : 10;
    score += selected.length * bonus;
    scoreEl.textContent=score;

    // エフェクト（簡易）
    selected.forEach(b=>{
      ctx.fillStyle="#fff";
      ctx.beginPath();
      ctx.arc(b.x,b.y,b.r+5,0,Math.PI*2);
      ctx.fill();
    });

    balls=balls.filter(b=>!selected.includes(b));
    while(balls.length<30){
      balls.push({x:Math.random()*280+20,y:0,r:18,type:icons[Math.floor(Math.random()*icons.length)]});
    }

    if(chainCount>=3 && !fever){ startFever(); }
  }
  selected=[];
  draw();
}

function startFever(){
  fever=true; feverTimer=10; chainCount=0;
  feverText.style.display='block';
  setTimeout(()=>feverText.style.display='none',1000);
}

function timer(){
  const t=setInterval(()=>{
    time--; timeEl.textContent=time;
    bar.style.width=(time/60*100)+"%";

    if(fever){
      feverTimer--;
      if(feverTimer<=0){ fever=false; }
    }

    if(time<=0){clearInterval(t);alert("終了！スコア:"+score);} 
  },1000);
}

createBalls(); draw(); timer();
</script>
</body>
</html>
